<!doctype html>
<html lang="en" data-anim="subtle">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Admin · ISAK Koblenz</title>
<link rel="icon" type="image/png" href="assets/img/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
  .admin-top { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:18px 0; border-bottom:1px solid var(--line-soft); margin-bottom:24px; flex-wrap:wrap; }
  .admin-top .brand { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:20px; }
  .admin-top .brand img { width:34px; height:34px; border-radius:50%; }
  .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
  .tab { padding:8px 16px; border:1px solid var(--line); background:var(--paper); border-radius:999px; cursor:pointer; font-size:14px; font-weight:500; }
  .tab.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .panel { display:none; }
  .panel.active { display:block; }
  table.data { width:100%; border-collapse:collapse; font-size:14px; }
  table.data th, table.data td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:top; }
  table.data th { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); }
  .login-card { max-width:380px; margin:8vh auto; background:var(--paper); border:1px solid var(--line-soft); border-radius:16px; padding:32px; }
  .login-card h1 { font-family:var(--font-display); font-size:26px; margin-bottom:6px; }
  .adm-field { margin-bottom:14px; }
  .adm-field label { display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:var(--ink-soft); }
  .adm-field input, .adm-field select, .adm-field textarea { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff; }
  .row-actions button { font-size:12px; padding:5px 10px; margin-right:6px; border:1px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; }
  .editor { background:var(--paper); border:1px solid var(--line-soft); border-radius:14px; padding:20px; margin-bottom:24px; }
  .editor .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .msg { padding:10px 14px; border-radius:10px; margin:12px 0; font-size:14px; }
  .msg.err { background:#fdecea; color:#b3261e; }
  .msg.ok { background:#e6f4ea; color:#0f5132; }
  .pill { font-size:11px; padding:3px 9px; border-radius:999px; background:var(--cream-warm); }
  .pill.active { background:#e6f4ea; color:#0f5132; }
  .pill.pending { background:#fff3cd; color:#7a5c00; }
  @media (max-width:640px){ .editor .grid2 { grid-template-columns:1fr; } table.data { display:block; overflow-x:auto; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-card" style="display:none">
  <div style="text-align:center;margin-bottom:18px"><img src="assets/img/logo.png" width="56" height="56" style="border-radius:50%" alt="ISAK"/></div>
  <h1>ISAK Admin</h1>
  <p style="color:var(--ink-muted);font-size:14px;margin-bottom:20px">Sign in to manage events, members and the roadmap.</p>
  <form id="login-form">
    <div class="adm-field"><label>Email</label><input type="email" id="login-email" required/></div>
    <div class="adm-field"><label>Password</label><input type="password" id="login-pass" required/></div>
    <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Sign in</button>
    <div id="login-msg"></div>
    <p style="font-size:12px;color:var(--ink-muted);margin-top:14px;text-align:center"><a href="#" id="forgot">Forgot password?</a></p>
  </form>
</div>

<!-- DASHBOARD -->
<div id="dash" class="admin-wrap" style="display:none">
  <div class="admin-top">
    <div class="brand"><img src="assets/img/logo.png" alt=""/> ISAK Admin</div>
    <div style="display:flex;align-items:center;gap:12px;font-size:14px">
      <span id="who" style="color:var(--ink-muted)"></span>
      <a href="admin-onboarding.html" class="btn btn-ghost btn-sm">Guide</a>
      <button id="logout" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="events">Events</div>
    <div class="tab" data-tab="members">Members</div>
    <div class="tab" data-tab="roadmap">Roadmap</div>
    <div class="tab" data-tab="leads">Leads</div>
    <div class="tab" data-tab="subscribers">Subscribers</div>
    <div class="tab" data-tab="admins">Admins</div>
  </div>

  <div id="panel-events" class="panel active"></div>
  <div id="panel-members" class="panel"></div>
  <div id="panel-roadmap" class="panel"></div>
  <div id="panel-leads" class="panel"></div>
  <div id="panel-subscribers" class="panel"></div>
  <div id="panel-admins" class="panel"></div>
</div>

<div id="boot" style="text-align:center;padding:20vh 20px;color:var(--ink-muted)">Loading…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="admin.js"></script>
</body>
</html>
